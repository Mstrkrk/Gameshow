<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Faceoff Buzzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
  :root{
    --bg:#070a14; --ink:#f4f7ff; --muted:#8a96b4; --hair:#243152;
    --left:#f7a728; --right:#27d3ef; --green:#34d27b; --red:#ff5263;
    --disp:"Arial Narrow","Roboto Condensed",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overscroll-behavior:none;}
  body{
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 80% at 50% 0%,#101a33,var(--bg));
    color:var(--ink);display:flex;flex-direction:column;
    padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
    user-select:none;
  }
  .top{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted);}
  .status{display:flex;align-items:center;gap:8px;}
  .led{width:9px;height:9px;border-radius:50%;background:var(--red);transition:.2s;}
  .led.ok{background:var(--green);box-shadow:0 0 10px var(--green);}
  h1{font-family:var(--disp);letter-spacing:.2em;text-transform:uppercase;font-size:16px;margin:0;}

  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}

  /* join screen */
  .join{display:flex;flex-direction:column;gap:16px;width:100%;max-width:340px;}
  .join input{
    width:100%;background:#0c1530;border:1px solid var(--hair);border-radius:12px;
    color:var(--ink);font:inherit;padding:15px;text-align:center;font-size:17px;
  }
  .join input:focus{outline:none;border-color:var(--right);}
  .sides{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .side{
    appearance:none;border:2px solid var(--hair);background:#0c1530;color:var(--ink);
    border-radius:14px;padding:20px 10px;font-family:var(--disp);text-transform:uppercase;
    letter-spacing:.08em;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .side[data-side="1"].sel{border-color:var(--left);box-shadow:0 0 24px -6px var(--left);}
  .side[data-side="2"].sel{border-color:var(--right);box-shadow:0 0 24px -6px var(--right);}
  .go{
    appearance:none;border:none;border-radius:14px;padding:17px;font-size:18px;font-weight:700;
    background:var(--ink);color:#06101f;cursor:pointer;letter-spacing:.04em;
  }
  .go:disabled{opacity:.4;}

  /* buzzer screen */
  .me{font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;font-size:22px;text-align:center;}
  .buzz{
    appearance:none;border:none;border-radius:50%;
    width:min(74vw,320px);height:min(74vw,320px);
    font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;
    font-size:clamp(34px,11vw,60px);font-weight:700;color:#06101f;cursor:pointer;
    transition:transform .08s, box-shadow .2s, background .2s, opacity .2s;
    background:#2a3656;box-shadow:0 16px 50px -12px #000 inset, 0 0 0 0 transparent;
  }
  .buzz.live{background:radial-gradient(circle at 50% 35%, #fff7e6, var(--mine)); box-shadow:0 0 70px -8px var(--mine);}
  .buzz.live:active{transform:scale(.95);}
  .buzz.win{background:radial-gradient(circle at 50% 35%, #d8ffe9, var(--green));box-shadow:0 0 70px -8px var(--green);}
  .buzz.lose{background:#1a2238;color:var(--muted);box-shadow:none;}
  .buzz:disabled{cursor:default;}
  .hint{color:var(--muted);font-size:14px;min-height:20px;text-align:center;}
  .score{font-family:var(--disp);font-variant-numeric:tabular-nums;font-size:15px;color:var(--muted);letter-spacing:.1em;}
</style>
</head>
<body>
  <div class="top">
    <h1>Faceoff</h1>
    <div class="status"><span class="led" id="led"></span><span id="statusTxt">Connecting…</span></div>
  </div>

  <div class="wrap">
    <!-- JOIN -->
    <div class="join" id="join">
      <input id="name" type="text" placeholder="Your name" maxlength="22" autocomplete="off">
      <div class="sides">
        <button class="side" data-side="1">Contestant 1</button>
        <button class="side" data-side="2">Contestant 2</button>
      </div>
      <button class="go" id="go" disabled>Join</button>
    </div>

    <!-- BUZZER (hidden until joined) -->
    <div class="wrap" id="play" style="display:none;">
      <div class="me" id="meName"></div>
      <button class="buzz" id="buzz" disabled>Wait</button>
      <div class="hint" id="hint">Get ready…</div>
      <div class="score" id="score"></div>
    </div>
  </div>

<script>
(function(){
  const room = new URLSearchParams(location.search).get('room');
  const led = document.getElementById('led'), statusTxt = document.getElementById('statusTxt');
  const joinEl = document.getElementById('join'), playEl = document.getElementById('play');
  const nameEl = document.getElementById('name'), goBtn = document.getElementById('go');
  const buzzBtn = document.getElementById('buzz'), hint = document.getElementById('hint');
  const meName = document.getElementById('meName'), scoreEl = document.getElementById('score');

  let side = 0, conn = null, peer = null, phase = 'idle';

  if(!room){ statusTxt.textContent = 'No room code in link'; return; }

  // side picker
  document.querySelectorAll('.side').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('.side').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); side = +b.dataset.side;
      goBtn.disabled = false;
    });
  });

  goBtn.addEventListener('click', connect);

  function setStatus(ok, txt){ led.classList.toggle('ok', ok); statusTxt.textContent = txt; }

  function connect(){
    if(!side) return;
    goBtn.disabled = true; goBtn.textContent = 'Connecting…';
    if(typeof Peer === 'undefined'){ setStatus(false,'No connection library'); return; }
    peer = new Peer();
    peer.on('open', ()=>{
      conn = peer.connect('faceoff-board-'+room, {reliable:true});
      conn.on('open', ()=>{
        setStatus(true,'Connected');
        conn.send({type:'join', side:side, name:(nameEl.value||'').trim()});
        joinEl.style.display='none'; playEl.style.display='flex';
        meName.textContent = (nameEl.value||'').trim() || ('Contestant '+side);
        buzzBtn.style.setProperty('--mine', side===1 ? 'var(--left)' : 'var(--right)');
      });
      conn.on('data', applyState);
      conn.on('close', ()=>{ setStatus(false,'Reconnecting…'); setTimeout(connect, 1200); });
    });
    peer.on('error', e=>{
      setStatus(false, (e&&e.type==='peer-unavailable') ? 'Room not found' : 'Connection error');
      goBtn.disabled=false; goBtn.textContent='Retry';
    });
  }

  function applyState(s){
    if(!s || s.type!=='state') return;
    phase = s.phase;
    const mine = s.buzzed === side;
    buzzBtn.className = 'buzz';
    if(phase==='live'){
      buzzBtn.classList.add('live'); buzzBtn.disabled=false; buzzBtn.textContent='Buzz';
      hint.textContent='Tap the moment you know it';
    } else if(phase==='buzzed'){
      buzzBtn.disabled=true;
      if(mine){ buzzBtn.classList.add('win'); buzzBtn.textContent="You're in"; hint.textContent='Answer!'; }
      else { buzzBtn.classList.add('lose'); buzzBtn.textContent='Locked'; hint.textContent='Too slow'; }
    } else if(phase==='right'){
      buzzBtn.disabled=true;
      if(mine){ buzzBtn.classList.add('win'); buzzBtn.textContent='Correct'; } else { buzzBtn.classList.add('lose'); buzzBtn.textContent='—'; }
      hint.textContent='';
    } else if(phase==='wrong'){
      buzzBtn.disabled=true;
      if(mine){ buzzBtn.classList.add('lose'); buzzBtn.textContent='Wrong'; } else { buzzBtn.classList.add('lose'); buzzBtn.textContent='—'; }
      hint.textContent='';
    } else { // idle
      buzzBtn.disabled=true; buzzBtn.textContent='Wait'; hint.textContent='Get ready…';
    }
    if(s.scores) scoreEl.textContent = (s.names?s.names[1]:'C1')+' '+s.scores[1]+'   ·   '+(s.names?s.names[2]:'C2')+' '+s.scores[2];
  }

  function doBuzz(){
    if(phase!=='live' || !conn || !conn.open) return;
    conn.send({type:'buzz'});
    if(navigator.vibrate) navigator.vibrate(60);
  }
  buzzBtn.addEventListener('click', doBuzz);
  // touchstart for faster response on mobile
  buzzBtn.addEventListener('touchstart', e=>{ e.preventDefault(); doBuzz(); }, {passive:false});
})();
</script>
</body>
</html>
